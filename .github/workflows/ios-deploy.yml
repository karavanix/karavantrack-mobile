name: Deploy Flutter iOS to App Store

on:
  workflow_dispatch:   # manual trigger from GitHub UI

jobs:
  deploy:
    runs-on: macos-latest

    steps:
      # 1. Checkout code
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Setup Flutter
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      # 3. Install dependencies
      - name: Flutter pub get
        run: flutter pub get

      # 4. Setup keychain and import certificate
      - name: Install Certificate & Provisioning Profile
        env:
          P12_BASE64: ${{ secrets.P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          PROVISIONING_PROFILE_BASE64: ${{ secrets.PROVISIONING_PROFILE_BASE64 }}
        run: |
          # Create a temp keychain
          security create-keychain -p "temppass" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "temppass" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain

          # Decode and import the .p12 certificate
          echo "$P12_BASE64" | base64 --decode > cert.p12
          security import cert.p12 \
            -k build.keychain \
            -P "$P12_PASSWORD" \
            -T /usr/bin/codesign
          security set-key-partition-list \
            -S apple-tool:,apple: \
            -s -k "temppass" build.keychain

          # Install provisioning profile
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$PROVISIONING_PROFILE_BASE64" | base64 --decode \
            > ~/Library/MobileDevice/Provisioning\ Profiles/profile.mobileprovision

      # 5. Build Flutter iOS (no codesign yet)
      - name: Flutter Build iOS
        run: flutter build ios --release --no-codesign

      # 6. Archive with Xcode
      - name: Xcode Archive
        run: |
          xcodebuild -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -sdk iphoneos \
            -configuration Release \
            -archivePath $PWD/build/Runner.xcarchive \
            archive \
            CODE_SIGN_STYLE=Manual

      # 7. Export IPA
      - name: Export IPA
        run: |
          xcodebuild -exportArchive \
            -archivePath $PWD/build/Runner.xcarchive \
            -exportOptionsPlist ios/ExportOptions.plist \
            -exportPath $PWD/build/output

      # 8. Decode .p8 key and upload to App Store
      - name: Upload to App Store Connect
        env:
          API_KEY_ID: ${{ secrets.APP_STORE_API_KEY_ID }}
          API_ISSUER_ID: ${{ secrets.APP_STORE_API_ISSUER_ID }}
          API_KEY_P8: ${{ secrets.APP_STORE_API_KEY_P8 }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$API_KEY_P8" | base64 --decode \
            > ~/.appstoreconnect/private_keys/AuthKey_${API_KEY_ID}.p8

          xcrun altool --upload-app \
            --type ios \
            --file $PWD/build/output/Runner.ipa \
            --apiKey "$API_KEY_ID" \
            --apiIssuer "$API_ISSUER_ID" \
            --verbose