name: Deploy Flutter iOS to App Store

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Flutter pub get
        run: flutter pub get

      - name: Install Certificate & Provisioning Profile
        env:
          P12_BASE64: ${{ secrets.P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          PROVISIONING_PROFILE_BASE64: ${{ secrets.PROVISIONING_PROFILE_BASE64 }}
        run: |
          security create-keychain -p "temppass" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "temppass" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain

          echo "$P12_BASE64" | base64 --decode > cert.p12
          security import cert.p12 \
            -k build.keychain \
            -P "$P12_PASSWORD" \
            -T /usr/bin/codesign
          security set-key-partition-list \
            -S apple-tool:,apple: \
            -s -k "temppass" build.keychain

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$PROVISIONING_PROFILE_BASE64" | base64 --decode \
            > ~/Library/MobileDevice/Provisioning\ Profiles/profile.mobileprovision

      - name: Flutter Build iOS
        run: flutter build ios --release --no-codesign

      - name: Xcode Archive & Generate ExportOptions
        env:
          TEAM_ID: ${{ secrets.APP_STORE_CONNECT_TEAM_ID }}
          BUNDLE_ID: ${{ secrets.BUNDLE_ID }}
        run: |
          PROFILE_PATH="$HOME/Library/MobileDevice/Provisioning Profiles/profile.mobileprovision"

          # Extract UUID and Name from installed provisioning profile
          PROFILE_UUID=$(security cms -D -i "$PROFILE_PATH" | \
            plutil -extract UUID xml1 -o - - | \
            sed -n 's/.*<string>\(.*\)<\/string>.*/\1/p')

          PROFILE_NAME=$(security cms -D -i "$PROFILE_PATH" | \
            plutil -extract Name xml1 -o - - | \
            sed -n 's/.*<string>\(.*\)<\/string>.*/\1/p')

          echo "✅ Profile UUID: $PROFILE_UUID"
          echo "✅ Profile Name: $PROFILE_NAME"
          echo "✅ Bundle ID:    $BUNDLE_ID"
          echo "✅ Team ID:      $TEAM_ID"

          # Dynamically generate ExportOptions.plist
          cat > ios/ExportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>app-store</string>
              <key>teamID</key>
              <string>$TEAM_ID</string>
              <key>signingStyle</key>
              <string>manual</string>
              <key>signingCertificate</key>
              <string>iPhone Distribution</string>
              <key>provisioningProfiles</key>
              <dict>
                  <key>$BUNDLE_ID</key>
                  <string>$PROFILE_NAME</string>
              </dict>
              <key>uploadBitcode</key>
              <false/>
              <key>uploadSymbols</key>
              <true/>
              <key>compileBitcode</key>
              <false/>
          </dict>
          </plist>
          EOF

          # Archive
          xcodebuild -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -sdk iphoneos \
            -configuration Release \
            -archivePath $PWD/build/Runner.xcarchive \
            archive \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM="$TEAM_ID" \
            CODE_SIGN_IDENTITY="iPhone Distribution" \
            PROVISIONING_PROFILE_SPECIFIER="$PROFILE_UUID"

      - name: Export IPA
        run: |
          xcodebuild -exportArchive \
            -archivePath $PWD/build/Runner.xcarchive \
            -exportOptionsPlist ios/ExportOptions.plist \
            -exportPath $PWD/build/output

      - name: Upload to App Store Connect
        env:
          API_KEY_ID: ${{ secrets.APP_STORE_API_KEY_ID }}
          API_ISSUER_ID: ${{ secrets.APP_STORE_API_ISSUER_ID }}
          API_KEY_P8: ${{ secrets.APP_STORE_API_KEY_P8 }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$API_KEY_P8" | base64 --decode \
            > ~/.appstoreconnect/private_keys/AuthKey_${API_KEY_ID}.p8

          # Find the IPA wherever it ended up
          IPA_PATH=$(find $PWD/build/output -name "*.ipa" | head -1)

          echo "📦 Found IPA at: $IPA_PATH"

          if [ -z "$IPA_PATH" ]; then
            echo "❌ No IPA found! Listing build/output contents:"
            ls -la $PWD/build/output/ || echo "Directory does not exist"
            exit 1
          fi

          xcrun altool --upload-app \
            --type ios \
            --file "$IPA_PATH" \
            --apiKey "$API_KEY_ID" \
            --apiIssuer "$API_ISSUER_ID" \
            --verbose